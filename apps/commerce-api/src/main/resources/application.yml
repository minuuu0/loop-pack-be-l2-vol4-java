server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - logging.yml
      - monitoring.yml

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

# PG 시뮬레이터 주소
pg-simulator:
  url: http://localhost:8082

# PG가 결제 최종 상태를 통보할 우리 콜백 주소 (http://localhost:8080 으로 시작해야 시뮬레이터가 허용)
payment:
  callback-url: http://localhost:8080/api/v1/payments/callback
  reconciliation:
    interval-ms: 60000            # 보정 스케줄 주기 (ms)
    grace-period-seconds: 60      # 이 시간 지나도록 PENDING 이면 콜백 유실로 보고 폴링 대상

# Feign 타임아웃 — 동기 호출이라 타임아웃은 HTTP 클라이언트 레벨에서 건다 (@TimeLimiter 아님)
feign:
  client:
    config:
      pgPayment:                # @FeignClient(name = "pgPayment") 와 일치
        connect-timeout: 1000   # 연결 수립 제한 (ms) — 못 닿으면 빨리 실패
        read-timeout: 2000      # 응답 대기 제한 (ms) — PG 지연 100~500ms 대비 여유

resilience4j:
  retry:
    instances:
      pgPayment:
        max-attempts: 3                       # 최초 1회 + 재시도 2회
        wait-duration: 500ms                  # 재시도 간 대기
        enable-exponential-backoff: true      # 대기시간 점증 (500ms -> 1s)
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - feign.RetryableException          # timeout/connection refused + ErrorDecoder가 5xx를 이걸로 변환
  circuitbreaker:
    instances:
      pgPayment:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10               # 최근 10건으로 실패율 판단
        minimum-number-of-calls: 5            # 최소 5건은 모여야 회로 개폐 판단
        failure-rate-threshold: 50            # 실패율 50% 초과 시 Open
        wait-duration-in-open-state: 10s      # Open 유지 후 Half-Open 전환
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 2s      # 이 시간 넘으면 '느린 호출'
        slow-call-rate-threshold: 50          # 느린 호출 50% 초과도 Open

---
spring:
  config:
    activate:
      on-profile: local, test

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd

springdoc:
  api-docs:
    enabled: false